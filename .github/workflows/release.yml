name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # To produce a release-key-signed APK in CI, add these repo secrets and
      # uncomment the step below:
      #   KEYSTORE_BASE64     — base64 of mysocialbattery.keystore
      #   KEYSTORE_PASSWORD
      #   KEY_ALIAS
      #   KEY_PASSWORD
      #
      # - name: Decode keystore
      #   run: |
      #     echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"
      #     cat > keystore.properties <<EOF
      #     storeFile=$RUNNER_TEMP/release.keystore
      #     storePassword=${{ secrets.KEYSTORE_PASSWORD }}
      #     keyAlias=${{ secrets.KEY_ALIAS }}
      #     keyPassword=${{ secrets.KEY_PASSWORD }}
      #     EOF

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK to include version
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/mysocialbattery-${GITHUB_REF_NAME#v}.apk"

      - name: Create/update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" out/*.apk --clobber
          else
            gh release create "$GITHUB_REF_NAME" out/*.apk \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
